<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Should I Bunk?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="heading">
            <p>Should I Bunk Today?</p>
        </div>
        <div class="field">
            <p>Enter the total classes conducted:</p>
            <input type="text" class="conducted" placeholder="0">
            <p>Enter the total classes attended:</p>
            <input type="text" class="attended" placeholder="0">
            <p>Enter the attendance percentage required</p>
            <input type="text" class="percentage" placeholder="0"><br>
            <button class="btn">Calculate</button>
        </div>
        <div class="msg">
            <p class="msg1"></p>
            <p class="skip"></p>
        </div>
    </div>
</body>
<script src="main.js"></script>
</html>
